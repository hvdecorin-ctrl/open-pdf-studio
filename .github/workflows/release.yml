name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.21.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open PDF Studio ${version}`,
              body: `## What's New in ${version}\n\nFree, open-source PDF annotation editor built with Tauri.\n\n### Downloads\n- **Windows**: Download the \`.msi\` installer or \`.exe\` setup file\n- **macOS**: Download the \`.dmg\` file (universal - supports Intel and Apple Silicon)\n- **Linux**: Download the \`.deb\` package, \`.AppImage\`, or \`.snap\` (also available on the [Snap Store](https://snapcraft.io/open-pdf-studio))\n\n### Features\n- PDF viewing and navigation\n- Text selection and search\n- Annotations: highlight, underline, strikethrough\n- Drawing tools: freehand, shapes, text\n- Multi-tab document support\n- Thumbnail navigation\n- Session restore`,
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 'tauri2026'
    defaults:
      run:
        working-directory: open-pdf-studio

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: open-pdf-studio
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

      - name: Authenticode sign Windows installer
        if: matrix.platform == 'windows-latest'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/open-pdf-studio/src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $NSIS_DIR = "src-tauri/target/release/bundle/nsis"

          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $ZIP = Get-ChildItem "$NSIS_DIR/*.nsis.zip" | Select-Object -First 1

          Write-Host "Signed exe: $($EXE.Name)"
          Write-Host "Old zip: $($ZIP.Name)"

          # Re-create .nsis.zip with the Authenticode-signed exe
          Remove-Item $ZIP.FullName
          Compress-Archive -Path $EXE.FullName -DestinationPath $ZIP.FullName

          # Re-generate updater signatures for both files
          # tauri signer sign writes a .sig file next to the input file
          npx tauri signer sign "$($EXE.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          npx tauri signer sign "$($ZIP.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Read the generated .sig files
          $EXE_SIG = Get-Content "$($EXE.FullName).sig" -Raw
          $ZIP_SIG = Get-Content "$($ZIP.FullName).sig" -Raw

          Write-Host "New exe signature: $($EXE_SIG.Substring(0, 50))..."
          Write-Host "New zip signature: $($ZIP_SIG.Substring(0, 50))..."

          # Download latest.json from release, update Windows signatures
          gh release download $VERSION --pattern "latest.json" --output latest.json --clobber --repo "${{ github.repository }}"

          $latest = Get-Content latest.json -Raw | ConvertFrom-Json

          foreach ($key in @('windows-x86_64')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $ZIP_SIG
              Write-Host "Updated signature for $key"
            }
          }
          foreach ($key in @('windows-x86_64-nsis')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $EXE_SIG
              Write-Host "Updated signature for $key"
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -NoNewline

          # Re-upload all modified files
          gh release upload $VERSION "$($EXE.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($EXE.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION latest.json --clobber --repo "${{ github.repository }}"

          Write-Host "All Windows artifacts re-uploaded with correct signatures"

  build-android:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: open-pdf-studio

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: open-pdf-studio/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            open-pdf-studio/src-tauri/target
          key: android-rust-${{ hashFiles('open-pdf-studio/src-tauri/Cargo.lock') }}
          restore-keys: |
            android-rust-

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        id: sign-apk
        run: |
          # Find the unsigned APK
          UNSIGNED_APK=$(find src-tauri/gen/android -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            exit 1
          fi
          echo "Found unsigned APK: $UNSIGNED_APK"
          APK_DIR=$(dirname "$UNSIGNED_APK")

          # Generate a signing keystore
          keytool -genkeypair -v \
            -keystore "$APK_DIR/release.keystore" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass openpdfstudio -keypass openpdfstudio \
            -dname "CN=Open PDF Studio, O=OpenAEC Foundation, L=Unknown, ST=Unknown, C=US"

          # Find the build-tools for zipalign and apksigner
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          # Zipalign the APK
          ALIGNED_APK="$APK_DIR/app-universal-release-aligned.apk"
          "${BUILD_TOOLS}zipalign" -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # Sign the APK
          SIGNED_APK="$APK_DIR/open-pdf-studio-release.apk"
          "${BUILD_TOOLS}apksigner" sign \
            --ks "$APK_DIR/release.keystore" \
            --ks-key-alias release \
            --ks-pass pass:openpdfstudio \
            --key-pass pass:openpdfstudio \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # Verify the signature
          "${BUILD_TOOLS}apksigner" verify --verbose "$SIGNED_APK"
          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT
          echo "Signed APK: $SIGNED_APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: open-pdf-studio/src-tauri/gen/android/**/open-pdf-studio-release.apk
          if-no-files-found: warn

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          SIGNED_APK=$(find src-tauri/gen/android -name "open-pdf-studio-release.apk" -type f | head -1)
          if [ -n "$SIGNED_APK" ]; then
            gh release upload "$VERSION" "$SIGNED_APK" --clobber --repo "${{ github.repository }}"
          fi

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build, build-android]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
