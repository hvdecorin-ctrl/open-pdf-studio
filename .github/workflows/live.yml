name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    uses: OpenAEC-Foundation/github/.github/workflows/deploy-site.yml@main
    with:
      deploy_host: ${{ vars.DEPLOY_HOST }}
      deploy_port: ${{ vars.DEPLOY_PORT }}
      deploy_user: ${{ vars.DEPLOY_USER }}
      deploy_path: /var/www/open-pdf-studio.open-aec.com
      node_version: "22"
      install_command: cd open-pdf-studio && npm ci
      build_command: cd open-pdf-studio && npm run build
      checkout_sparse: |
        open-pdf-studio
    secrets:
      deploy_ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
